name: Deploy the HTTP Backend
on:
  push:
    branches:
      - main
jobs:
  build: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./apps/http-backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/http-backend:${{ github.sha }}
      
      - name: Install cloudflared
        run: |
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/cloudflared

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to server
        env:
          SHA: ${{ github.sha }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PORT: ${{ secrets.HTTP_BACKEND_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          ssh -o ProxyCommand="cloudflared access ssh --hostname %h" \
              -o StrictHostKeyChecking=no \
              -i ~/.ssh/id_rsa \
              $SSH_USERNAME@$SSH_HOST \
              "docker kill http-backend-container || true && docker rm http-backend-container || true && docker pull anmolban/http-backend:$SHA && docker run -d --name http-backend-container -e DATABASE_URL=$DATABASE_URL -e JWT_SECRET=$JWT_SECRET -p $PORT:$PORT --restart=unless-stopped anmolban/http-backend:$SHA"
