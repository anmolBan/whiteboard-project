name: Deploy the WS Backend
on:
  push:
    branches:
      - main
jobs:
  build: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./apps/ws-backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ws-backend:${{ github.sha }}
      
      - name: Install cloudflared
        run: |
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/cloudflared

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to server
        env:
          SHA: ${{ github.sha }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          WS_PORT: ${{ secrets.WS_PORT }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          REDIS_TLS: ${{ secrets.REDIS_TLS }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          ssh -o ProxyCommand="cloudflared access ssh --hostname %h" \
              -o StrictHostKeyChecking=no \
              -i ~/.ssh/id_rsa \
              $SSH_USERNAME@$SSH_HOST \
              "docker kill ws-backend-container || true && docker rm ws-backend-container || true && docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ws-backend:$SHA && docker run -d --network host --name ws-backend-container --restart=unless-stopped -e DATABASE_URL=\"$DATABASE_URL\" -e JWT_SECRET=\"$JWT_SECRET\" -e WS_PORT=\"$WS_PORT\" -e REDIS_HOST=\"$REDIS_HOST\" -e REDIS_PORT=\"$REDIS_PORT\" -e REDIS_PASSWORD=\"$REDIS_PASSWORD\" -e REDIS_TLS=\"$REDIS_TLS\" ${{ secrets.DOCKERHUB_USERNAME }}/ws-backend:$SHA"